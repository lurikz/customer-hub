server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — todas as rotas servem index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets versionados pelo Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html nunca em cache (para sempre pegar nova build)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Proxy reverso para o backend — injeta a x-api-key server-side.
  # A chave NÃO é exposta ao navegador (nunca chega no bundle JS).
  location /api/ {
    proxy_pass ${BACKEND_URL}/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header x-api-key "${API_KEY}";
    proxy_read_timeout 30s;
  }
}
