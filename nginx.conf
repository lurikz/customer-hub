server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — todas as rotas servem index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets versionados pelo Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html nunca em cache (para sempre pegar nova build)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
